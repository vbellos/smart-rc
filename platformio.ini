; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = 4d_systems_esp32s3_gen4_r8n16

[env:4d_systems_esp32s3_gen4_r8n16]
; Use the pioarduino fork of platform-espressif32 so we get Arduino-ESP32 3.x
; (for the unified LEDC API used by MotorDriver: ledcAttach(pin,freq,res)).
; The upstream platformio/espressif32 platform is still pinned to 2.x.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -I src
    -DCORE_DEBUG_LEVEL=3
build_unflags =
    -std=gnu++11
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    ; Async HTTP + (upcoming) WebSocket server. Swapped in for the stock
    ; sync WebServer.h so route handlers don't block loop() and so Phase 2
    ; can bolt a /ws endpoint onto the same listener.
    mathieucarbou/AsyncTCP @ ^3.2.0
    mathieucarbou/ESPAsyncWebServer @ ^3.3.0
; The native-only test directory must not be compiled for the device.
test_ignore = test_steering_native

; Host-side unit tests. Run with:  pio test -e native_test
[env:native_test]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -I src
    -I test/native_stubs
test_build_src = true
build_src_filter = +<motors/MotorDriver.cpp> +<motors/Steering.cpp>
test_filter = test_steering_native
